name: hercare
description: HerCare - Maternal Healthcare Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  image_picker: ^1.0.7

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  cloud_functions: ^5.1.3
  firebase_storage: ^12.4.10
  google_sign_in: ^6.2.1
  
  # State Management
  provider: ^6.1.2
  
  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  
  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - lib\assets\images\HerCare-v1.png
  
